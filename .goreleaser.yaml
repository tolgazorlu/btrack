version: 2

project_name: btrack

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}
    main: .

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: tolgazorlu
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/tolgazorlu/btrack
    description: AI-native CLI time tracker with git-style workflow
    license: MIT
    install: bin.install "btrack"
    test: system "#{bin}/btrack", "--version"

scoop:
  repository:
    owner: tolgazorlu
    name: scoop-bucket
  homepage: https://github.com/tolgazorlu/btrack
  description: AI-native CLI time tracker with git-style workflow
  license: MIT
